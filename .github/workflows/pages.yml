# Pages 部署工作流，负责刷新实时面板数据并发布最新站点构建结果。
name: Deploy Pages

on:
  push:
    branches:
      - main
      - codex/react-antv-homepage
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # 构建任务负责安装依赖、刷新实时数据并产出静态文件。
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm install

      - name: Refresh live panel data
        run: npm run refresh:live-panel

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # 部署任务把构建产物发布到 GitHub Pages。
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
